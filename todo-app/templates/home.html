<!DOCTYPE html>
<html>
<head>
  <title>Todo List</title>
</head>
<body>
  <h2>My Todo List</h2>

  <!-- Form to add new todos -->
  <form action="/home" method="POST">
    <input type="text" name="todo" placeholder="Enter a task">
    <button type="submit">Add</button>
  </form>

  <!-- Display todos with checkboxes -->
  <ul>
    {% for t in todos %}
      <li>
        {{ t }}
        <input type="checkbox">
      </li>
    {% endfor %}
  </ul>
  
<a href="{{ url_for('index') }}">Back to homepage</a>


</body>
</html>
